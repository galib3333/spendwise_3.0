<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="SpendWise — Smart expense tracking with budgets, reports, and savings goals">
<meta name="theme-color" content="#1a1915">
<link rel="manifest" href="manifest.json">
<title>SpendWise — Expense Tracker</title>
<link rel="stylesheet" href="expense-tracker.css">
</head>
<body>
<div class="app">
  <div class="overlay" id="overlay" aria-hidden="true"></div>
  <button class="hamburger" id="hamburgerBtn" aria-label="Toggle navigation menu" aria-expanded="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>
  <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
    <div class="sidebar-header">
      <h1>SpendWise</h1>
      <p>Smart expense tracking</p>
    </div>
    <div class="mode-toggle" id="modeToggle" role="tablist" aria-label="App mode">
      <button class="mode-btn active" role="tab" aria-selected="true" data-mode="personal" tabindex="0">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Personal
      </button>
      <button class="mode-btn" role="tab" aria-selected="false" data-mode="business" tabindex="0">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Business
      </button>
    </div>
    <nav class="nav" role="menubar" id="mainNav">
      <div class="nav-item active" data-page="dashboard" role="menuitem" tabindex="0" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </div>
      <div class="nav-item" data-page="transactions" role="menuitem" tabindex="0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/><circle cx="8" cy="6" r="2" fill="currentColor"/><circle cx="16" cy="12" r="2" fill="currentColor"/><circle cx="10" cy="18" r="2" fill="currentColor"/></svg>
        Transactions
      </div>
      <div class="nav-section" role="separator">Analysis</div>
      <div class="nav-item" data-page="weekly" role="menuitem" tabindex="0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Weekly Report
      </div>
      <div class="nav-item" data-page="monthly" role="menuitem" tabindex="0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2h7"/><path d="M16 2v4M8 2v4"/></svg>
        Monthly Report
      </div>
      <div class="nav-item" data-page="yearly" role="menuitem" tabindex="0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        Yearly Report
      </div>
      <div class="nav-section" role="separator">Planning</div>
      <div class="nav-item" data-page="budgets" role="menuitem" tabindex="0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        Budgets
      </div>
      <div class="nav-item" data-page="recurring" role="menuitem" tabindex="0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 105.64-8.36L1 10"/></svg>
        Recurring
      </div>
      <div class="nav-item" data-page="savings" role="menuitem" tabindex="0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
        Savings Goals
      </div>
      <div class="nav-section" role="separator">Tools</div>
      <div class="nav-item" data-page="export" role="menuitem" tabindex="0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export Data
      </div>
      <div class="nav-item" data-page="settings" role="menuitem" tabindex="0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Settings
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="flex flex-center gap-8" style="padding:0 12px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text3)" aria-hidden="true"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        <div class="toggle" id="themeToggle" role="switch" aria-checked="true" aria-label="Toggle dark theme" tabindex="0"></div>
      </div>
    </div>
  </aside>
  <main class="main" id="mainContent" role="main" aria-label="Main content">
    <noscript>
      <div style="padding:40px;text-align:center;color:var(--text2)">
        <h2>SpendWise requires JavaScript</h2>
        <p>Please enable JavaScript in your browser to use this app.</p>
      </div>
    </noscript>
  </main>
  <button class="fab" id="fabQuickAdd" aria-label="Quick add expense" title="Quick add expense">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<!-- Modals -->
<div class="modal-overlay" id="transactionModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <h3 id="modalTitle">Add Transaction</h3>
    <div class="input-group">
      <label>Type</label>
      <div class="tabs" id="typeTabs" role="tablist">
        <button class="tab active" role="tab" aria-selected="true" data-type="expense">Expense</button>
        <button class="tab" role="tab" aria-selected="false" data-type="income">Income</button>
      </div>
    </div>
    <div class="form-row">
      <div class="input-group">
        <label for="txAmount">Amount</label>
        <input type="number" class="input" id="txAmount" placeholder="0.00" step="0.01" min="0" required aria-required="true">
      </div>
      <div class="input-group">
        <label for="txDate">Date</label>
        <input type="date" class="input" id="txDate" required aria-required="true">
      </div>
    </div>
    <div class="form-row">
      <div class="input-group">
        <label for="txCategory">Category</label>
        <select class="input" id="txCategory" required aria-required="true"></select>
      </div>
      <div class="input-group">
        <label for="txPayment">Payment Method</label>
        <select class="input" id="txPayment">
          <option value="cash">Cash</option>
          <option value="card">Debit Card</option>
          <option value="credit">Credit Card</option>
          <option value="upi">UPI</option>
          <option value="bank">Bank Transfer</option>
          <option value="wallet">Digital Wallet</option>
        </select>
      </div>
    </div>
    <div class="input-group">
      <label for="txDesc">Description</label>
      <input type="text" class="input" id="txDesc" placeholder="What was this for?">
    </div>
    <div class="input-group">
      <label for="txTags">Tags (comma separated)</label>
      <input type="text" class="input" id="txTags" placeholder="e.g. urgent, monthly">
    </div>
    <div class="input-group">
      <div class="flex flex-center gap-8">
        <input type="checkbox" id="txRecurring" style="accent-color:var(--accent)">
        <label for="txRecurring" style="margin:0;cursor:pointer">Recurring transaction</label>
      </div>
    </div>
    <div class="form-row hidden" id="recurringOptions">
      <div class="input-group">
        <label for="txFreq">Frequency</label>
        <select class="input" id="txFreq">
          <option value="weekly">Weekly</option>
          <option value="biweekly">Bi-Weekly</option>
          <option value="monthly" selected>Monthly</option>
          <option value="quarterly">Quarterly</option>
          <option value="yearly">Yearly</option>
        </select>
      </div>
    </div>
    <input type="hidden" id="txId">
    <div class="modal-actions">
      <button class="btn btn-secondary" data-close-modal="transactionModal">Cancel</button>
      <button class="btn btn-primary" id="txSaveBtn">Save Transaction</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="budgetModal" role="dialog" aria-modal="true" aria-label="Set Budget">
  <div class="modal">
    <h3>Set Budget</h3>
    <div class="input-group">
      <label for="budgetCategory">Category</label>
      <select class="input" id="budgetCategory" required aria-required="true"></select>
    </div>
    <div class="input-group">
      <label for="budgetAmount">Monthly Budget Limit</label>
      <input type="number" class="input" id="budgetAmount" placeholder="0.00" step="0.01" min="0" required aria-required="true">
    </div>
    <input type="hidden" id="budgetEditId">
    <div class="modal-actions">
      <button class="btn btn-secondary" data-close-modal="budgetModal">Cancel</button>
      <button class="btn btn-primary" id="budgetSaveBtn">Save Budget</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="savingsModal" role="dialog" aria-modal="true" aria-label="Savings Goal">
  <div class="modal">
    <h3>Savings Goal</h3>
    <div class="input-group">
      <label for="goalName">Goal Name</label>
      <input type="text" class="input" id="goalName" placeholder="e.g. Emergency Fund" required aria-required="true">
    </div>
    <div class="form-row">
      <div class="input-group">
        <label for="goalTarget">Target Amount</label>
        <input type="number" class="input" id="goalTarget" placeholder="0.00" step="0.01" min="0" required aria-required="true">
      </div>
      <div class="input-group">
        <label for="goalCurrent">Current Saved</label>
        <input type="number" class="input" id="goalCurrent" placeholder="0.00" step="0.01" min="0">
      </div>
    </div>
    <div class="input-group">
      <label for="goalDate">Target Date</label>
      <input type="date" class="input" id="goalDate">
    </div>
    <input type="hidden" id="goalEditId">
    <div class="modal-actions">
      <button class="btn btn-secondary" data-close-modal="savingsModal">Cancel</button>
      <button class="btn btn-primary" id="goalSaveBtn">Save Goal</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="recurringModal" role="dialog" aria-modal="true" aria-label="Recurring Expense">
  <div class="modal">
    <h3>Add Recurring Expense</h3>
    <div class="form-row">
      <div class="input-group">
        <label for="recAmount">Amount</label>
        <input type="number" class="input" id="recAmount" placeholder="0.00" step="0.01" min="0" required aria-required="true">
      </div>
      <div class="input-group">
        <label for="recFreq">Frequency</label>
        <select class="input" id="recFreq">
          <option value="weekly">Weekly</option>
          <option value="biweekly">Bi-Weekly</option>
          <option value="monthly" selected>Monthly</option>
          <option value="quarterly">Quarterly</option>
          <option value="yearly">Yearly</option>
        </select>
      </div>
    </div>
    <div class="input-group">
      <label for="recCategory">Category</label>
      <select class="input" id="recCategory" required aria-required="true"></select>
    </div>
    <div class="input-group">
      <label for="recDesc">Description</label>
      <input type="text" class="input" id="recDesc" placeholder="e.g. Netflix subscription" required aria-required="true">
    </div>
    <div class="form-row">
      <div class="input-group">
        <label for="recStart">Start Date</label>
        <input type="date" class="input" id="recStart" required aria-required="true">
      </div>
      <div class="input-group">
        <label for="recNext">Next Due Date</label>
        <input type="date" class="input" id="recNext" required aria-required="true">
      </div>
    </div>
    <div class="input-group">
      <label for="recEnd">End Date <span class="text-muted text-sm">(optional, leave blank for ongoing)</span></label>
      <input type="date" class="input" id="recEnd">
    </div>
    <input type="hidden" id="recEditId">
    <div class="modal-actions">
      <button class="btn btn-secondary" data-close-modal="recurringModal">Cancel</button>
      <button class="btn btn-primary" id="recSaveBtn">Save</button>
    </div>
  </div>
</div>

<div class="quick-add-overlay" id="quickAddOverlay" role="dialog" aria-modal="true" aria-label="Quick add expense">
  <div class="quick-add-panel">
    <div class="flex flex-center flex-between mb-16">
      <h3 style="margin:0;border:none;padding:0">Quick Add Expense</h3>
      <button class="btn btn-ghost btn-sm btn-icon" id="quickAddClose" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="form-row">
      <div class="input-group">
        <label for="quickAmount">Amount</label>
        <input type="number" class="input" id="quickAmount" placeholder="0.00" step="0.01" min="0" required aria-required="true">
      </div>
      <div class="input-group">
        <label for="quickCategory">Category</label>
        <select class="input" id="quickCategory" required aria-required="true"></select>
      </div>
    </div>
    <div class="input-group">
      <label for="quickDesc">Description (optional)</label>
      <input type="text" class="input" id="quickDesc" placeholder="What was this for?">
    </div>
    <div class="input-group">
      <label for="quickPayment">Payment</label>
      <select class="input" id="quickPayment">
        <option value="cash">Cash</option>
        <option value="card">Debit Card</option>
        <option value="credit">Credit Card</option>
        <option value="upi">UPI</option>
        <option value="bank">Bank Transfer</option>
        <option value="wallet">Digital Wallet</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="quickAddCancel">Cancel</button>
      <button class="btn btn-primary" id="quickAddSave">Add Expense</button>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>

<!-- Lock Screen -->
<div class="lock-screen" id="lockScreen" role="dialog" aria-modal="true" aria-label="App lock">
  <div class="lock-panel" id="lockPanel">
    <!-- Filled by JS -->
  </div>
</div>
</body>
</html>
